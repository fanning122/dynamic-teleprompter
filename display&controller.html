<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMGAP提词器2025</title>
    <style>
        :root {
            --harmony-scale: 1;
        }
        
        body {
            font-family: -apple-system, "HarmonyOS Sans", BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #222;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        /* 响应式布局 - 竖屏模式 */
        @media (orientation: portrait) {
            .control-header {
                height: 25%;
                min-height: 150px;
            }
            
            .preview-area {
                height: 50%;
                flex: 1;
            }
            
            .edit-area {
                height: 25%;
                min-height: 120px;
            }
        }
        
        /* 响应式布局 - 横屏模式 */
        @media (orientation: landscape) {
            body {
                flex-direction: row;
            }
            
            .control-header {
                width: 10%;
                min-width: 100px;
                height: 100%;
            }
            
            .preview-area {
                width: 90%;
                height: 100%;
                flex: 1;
            }
            
            .edit-area {
                width: 10%;
                min-width: 100px;
                height: 100%;
            }
            
            .control-buttons {
                flex-direction: column;
            }
            
            .control-sliders {
                margin-top: 20px;
            }
        }
        
        /* 上部：控制按钮区域 */
        .control-header {
            background-color: #333;
            padding: 10px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .control-header h1 {
            font-size: 18px;
            margin: 0 0 10px 0;
            color: #2196F3;
            text-align: center;
        }
        
        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        button {
            padding: 10px 15px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            min-width: 60px;
        }
        
        button:hover {
            background-color: #1976D2;
        }
        
        button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
        
        .control-sliders {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .slider-group label {
            min-width: 60px;
            font-size: 14px;
        }
        
        input[type="range"] {
            flex: 1;
        }
        
        .slider-value {
            min-width: 40px;
            text-align: center;
            font-size: 14px;
        }
        
        /* 中部：预览区域 */
        .preview-area {
            background-color: #111;
            margin: 5px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }
        
        .preview-text {
            font-size: calc(20px * var(--harmony-scale));
            line-height: 1.6;
            color: #fff;
            position: absolute;
            width: 90%;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
            white-space: pre-wrap;
            text-indent: 2em;
            top: 0;
            left: 0;
            transition: transform 0.1s linear;
        }
        
        /* 修复镜像文字间距问题 - 使用伪元素方案 */
        .preview-text.mirror {
            transform: none;
        }
        
        .preview-text.mirror::before {
            content: attr(data-text);
            display: block;
            transform: scaleX(-1);
            white-space: pre-wrap;
        }
        
        .preview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), transparent 30%, transparent 70%, rgba(0,0,0,0.7));
            pointer-events: none;
        }
        
        /* 滚动条样式 */
        .scrollbar-container {
            position: absolute;
            right: 10px;
            top: 10px;
            bottom: 10px;
            width: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            z-index: 10;
        }
        
        .scrollbar-thumb {
            position: absolute;
            width: 100%;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.7);
        }
        
        .scrollbar-thumb:active {
            background-color: rgba(255, 255, 255, 0.9);
        }
        
        /* 下部：文本编辑区域 */
        .edit-area {
            background-color: #333;
            padding: 10px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        
        .edit-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        #text-input {
            width: 100%;
            flex: 1;
            min-height: 80px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #555;
            border-radius: 6px;
            background-color: #fff;
            color: #000;
            resize: vertical;
            box-sizing: border-box;
            white-space: pre-wrap;
        }
        
        .status-info {
            background: #444;
            padding: 5px 10px;
            border-radius: 4px;
            margin-top: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- 上部：控制按钮区域 -->
    <div class="control-header">
        <h1>🖥️ CMG提词器2025</h1>
        
        <div class="control-buttons">
            <button id="start-btn">开始</button>
            <button id="pause-btn" disabled>暂停</button>
            <button id="reset-btn">重置</button>
            <button id="mirror-btn">镜像</button>
        </div>
        
        <div class="control-sliders">
            <div class="slider-group">
                <label for="speed">速度:</label>
                <input type="range" id="speed" min="1" max="20" value="5">
                <span id="speed-value" class="slider-value">5</span>
            </div>
            
            <div class="slider-group">
                <label for="font-size">字体:</label>
                <input type="range" id="font-size" min="16" max="48" value="28">
                <span id="font-size-value" class="slider-value">28px</span>
            </div>
            
            <div class="slider-group">
                <label>滚动位置:</label>
                <span id="progress-display" class="slider-value">0px</span>
            </div>
        </div>
        
        <div id="statusInfo" class="status-info">
            状态: <span id="controlStatus">已暂停</span>
        </div>
    </div>
    
    <!-- 中部：预览区域 -->
    <div class="preview-area" id="preview-area">
        <div class="preview-text" id="preview-text" data-text="">
            文本预览区域\n\n在此编辑文本内容...
        </div>
        <div class="preview-overlay"></div>
        
        <!-- 滚动条 -->
        <div class="scrollbar-container" id="scrollbar-container">
            <div class="scrollbar-thumb" id="scrollbar-thumb"></div>
        </div>
    </div>
    
    <!-- 下部：文本编辑区域 -->
    <div class="edit-area">
        <div class="edit-controls">
            <button id="open-file-btn">打开文件</button>
            <input type="file" id="file-input" accept="*/*" style="display: none;">
            <button id="clear-btn">清空</button>
        </div>
        
        <textarea id="text-input" placeholder="在此输入提词文本..."></textarea>
    </div>

    <script>
        // DOM元素
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const mirrorBtn = document.getElementById('mirror-btn');
        const speedSlider = document.getElementById('speed');
        const speedValue = document.getElementById('speed-value');
        const fontSizeSlider = document.getElementById('font-size');
        const fontSizeValue = document.getElementById('font-size-value');
        const textInput = document.getElementById('text-input');
        const openFileBtn = document.getElementById('open-file-btn');
        const fileInput = document.getElementById('file-input');
        const clearBtn = document.getElementById('clear-btn');
        const previewText = document.getElementById('preview-text');
        const progressDisplay = document.getElementById('progress-display');
        const controlStatus = document.getElementById('controlStatus');
        const statusInfo = document.getElementById('statusInfo');
        const previewArea = document.getElementById('preview-area');
        
        // WebSocket 通信
        let ws = null;
        let isConnected = false;

        // 初始化WebSocket连接
        function initWebSocket() {
            try {
                // 使用服务器实际IP地址，而不是localhost
                // 将 '10.85.6.252' 替换为您的电脑实际IP地址
                const serverIP = '10.85.6.252'; // 修改为您的电脑IP
                const wsUrl = `ws://${serverIP}:3000/display`;
                
                ws = new WebSocket(wsUrl);
        
                ws.onopen = function() {
                    isConnected = true;
                    console.log('✅ 提词器已连接到服务器');
                    updateConnectionStatus('已连接服务器');
                };
        
                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        handleRemoteCommand(data);
                    } catch (e) {
                        console.error('❌ 消息解析错误:', e);
                    }
                };
        
                ws.onclose = function() {
                    isConnected = false;
                    updateConnectionStatus('服务器连接断开');
                    // 3秒后重连
                    setTimeout(initWebSocket, 3000);
                };
        
                ws.onerror = function(error) {
                    console.error('❌ WebSocket错误:', error);
                    updateConnectionStatus('连接错误');
                };
        
            } catch (error) {
                console.error('❌ 连接WebSocket失败:', error);
            }
        }

        // 处理远程命令
        function handleRemoteCommand(data) {
            try {
                console.log('📨 收到远程命令:', data);
        
                switch(data.type) {
                    case 'play':
                        console.log('执行播放命令');
                        startDisplayScrolling();
                        break;
                    case 'pause':
                        console.log('执行暂停命令');
                        stopDisplayScrolling();
                        break;
                    case 'reset':
                        console.log('执行重置命令');
                        stopDisplayScrolling();
                        displayPosition = 0;
                        isScrollComplete = false;
                        updateDisplayPosition();
                        updateScrollbar();
                        updatePlayState(false);
                        break;
                    case 'scrollPosition':
                        console.log('执行滚动位置命令:', data.value);
                        // 更新显示位置
                        displayPosition = data.value;
                        updateDisplayPosition();
                        updateScrollbar();

                        // 不强制停止滚动，而是保持当前播放状态
                        // 只在确实需要停止时才停止
                        if (data.forceStop !== false) {
                        stopDisplayScrolling();
                        }
                        
                        // 只有当确实是从播放状态切换到手动控制时，才停止滚动
                        // 并发送状态更新
                        if (displayIsPlaying) {
                            stopDisplayScrolling();
                            sendStatusUpdate('playState', false); // 通知遥控器状态变化
                        }
                        break;
                    default:
                        console.log('未知命令类型:', data.type);
                }
            } catch (error) {
                console.error('❌ 处理远程命令错误:', error);
            }
        }

        // 发送状态更新到遥控器
        function sendStatusUpdate(type, value) {
            if (isConnected && ws && ws.readyState === WebSocket.OPEN) {
                try {
                    const message = {
                        type: type,
                        value: value,
                        timestamp: Date.now()
                    };
                    console.log('📤 提词器发送状态更新:', message);
                    ws.send(JSON.stringify(message));
                } catch (error) {
                    console.error('❌ 发送状态更新失败:', error);
                }
            } else {
                console.warn('⚠️ WebSocket未连接，无法发送状态更新');
            }
        }

        // 更新连接状态显示
        function updateConnectionStatus(message) {
            const statusElement = document.getElementById('controlStatus');
            const statusInfo = document.getElementById('statusInfo');
            
            if (statusElement) {
                statusElement.textContent = message;
            }
            
            // 根据状态改变颜色
            if (message.includes('断开') || message.includes('错误')) {
                statusInfo.style.background = '#f44336';
            } else if (message.includes('连接')) {
                statusInfo.style.background = '#4CAF50';
            } else {
                statusInfo.style.background = '#ff9800';
            }
            
            console.log('🔗 ' + message);
        }

        // 滚动条元素
        const scrollbarContainer = document.getElementById('scrollbar-container');
        const scrollbarThumb = document.getElementById('scrollbar-thumb');
        
        // 滚动系统变量
        let displayPosition = 0;
        let displayIsPlaying = false;
        let displayAnimationId;
        let displayTextHeight = 0;
        let displayContainerHeight = 0;
        let isScrollComplete = false;
        let lastSendTime = 0;
        let maxScrollPosition = 0;
        
        // 滚动条变量
        let isDragging = false;
        let dragStartY = 0;
        let thumbStartY = 0;
        
        // 触屏控制变量
        let tapTimeout;
        let lastTap = 0;
        
        // 镜像状态
        let isMirrored = false;
        
        // 初始文本
        let currentText = "在此输入提词文本...\n\n您可以：\n• 编辑文本内容\n• 调节滚动速度\n• 控制开始/暂停\n• 设置镜像模式";

        // 初始化滚动系统
        function initDisplayScrolling() {
            displayContainerHeight = previewArea.clientHeight;
            displayTextHeight = previewText.scrollHeight;
            maxScrollPosition = displayTextHeight;
            
            console.log(`📏 文本高度更新: ${displayTextHeight}px`);

            // 发送文本高度到遥控器
            sendStatusUpdate('textHeight', displayTextHeight);
            
            // 重置到起始位置
            displayPosition = 0;
            isScrollComplete = false;
            updateDisplayPosition();
            updateScrollbar();
        }
        
        // 更新显示位置
        function updateDisplayPosition() {
            // 最大滚动位置为文本总高度
            const maxPosition = displayTextHeight;
            
            // 检查是否滚动完成
            if (displayPosition >= maxPosition) {
                displayPosition = maxPosition;
                isScrollComplete = true;
                
                if (displayIsPlaying) {
                    stopDisplayScrolling();
                }
            } else {
                isScrollComplete = false;
            }
            
            // 应用位置变换
            previewText.style.transform = `translateY(-${displayPosition}px)`;
            progressDisplay.textContent = `${Math.round(displayPosition)}px`;
            
            // 发送状态更新到遥控器
            const currentTime = Date.now();
            if (currentTime - lastSendTime > 100) { // 限制发送频率
                sendStatusUpdate('positionUpdate', displayPosition);
                sendStatusUpdate('playState', displayIsPlaying);
                lastSendTime = currentTime;
            }
            
            // 更新状态显示
            if (isScrollComplete) {
                controlStatus.textContent = '滚动完成';
                statusInfo.style.background = '#9c27b0';
            } else if (displayIsPlaying) {
                controlStatus.textContent = '滚动中';
                statusInfo.style.background = '#4CAF50';
            } else {
                controlStatus.textContent = '已暂停';
                statusInfo.style.background = '#ff9800';
            }
        }
        
        // 滚动动画
        function displayAnimate() {
            if (isScrollComplete) {
                stopDisplayScrolling();
                return;
            }
            
            const speed = parseInt(speedSlider.value);
            displayPosition += speed / 10;
            updateDisplayPosition();
            updateScrollbar();
            
            // 发送位置更新到遥控器
            sendStatusUpdate('positionUpdate', displayPosition);
            
            if (displayIsPlaying && !isScrollComplete) {
                displayAnimationId = requestAnimationFrame(displayAnimate);
            }
        }
        
        // 开始滚动
        function startDisplayScrolling() {
            if (!displayIsPlaying) {
                // 如果已经滚动完成，重置到开始位置
                if (isScrollComplete) {
                    displayPosition = 0;
                    isScrollComplete = false;
                    updateDisplayPosition();
                    updateScrollbar();
                }
                displayIsPlaying = true;
                displayAnimate();
                updatePlayState(true);
            }
        }
        
        // 停止滚动
        function stopDisplayScrolling() {
            displayIsPlaying = false;
            cancelAnimationFrame(displayAnimationId);
            updatePlayState(false);
        }
        
        // 更新播放状态
        function updatePlayState(playing) {
            if (playing) {
                startBtn.disabled = true;
                pauseBtn.disabled = false;
            } else {
                startBtn.disabled = false;
                pauseBtn.disabled = true;
            }
        }
        
        // 更新滚动条位置
        function updateScrollbar() {
            if (displayTextHeight <= 0) return;
            
            const containerHeight = scrollbarContainer.clientHeight;
            const thumbHeight = scrollbarThumb.clientHeight;
            const maxThumbPosition = containerHeight - thumbHeight;
            const thumbPosition = (displayPosition / displayTextHeight) * maxThumbPosition;
            
            scrollbarThumb.style.top = `${thumbPosition}px`;
        }
        
        // 根据滚动条位置更新文本位置
        function updatePositionFromScrollbar(thumbPosition) {
            const containerHeight = scrollbarContainer.clientHeight;
            const thumbHeight = scrollbarThumb.clientHeight;
            const maxThumbPosition = containerHeight - thumbHeight;
            
            if (maxThumbPosition <= 0) return;
            
            displayPosition = (thumbPosition / maxThumbPosition) * displayTextHeight;
            updateDisplayPosition();
            
            // 发送位置更新到遥控器
            sendStatusUpdate('positionUpdate', displayPosition);
        }
        
        // 滚动条事件处理
        function initScrollbarEvents() {
            // 鼠标事件
            scrollbarThumb.addEventListener('mousedown', function(e) {
                isDragging = true;
                dragStartY = e.clientY;
                thumbStartY = parseInt(scrollbarThumb.style.top) || 0;
                
                // 停止自动滚动
                stopDisplayScrolling();
                
                document.addEventListener('mousemove', handleThumbDrag);
                document.addEventListener('mouseup', stopThumbDrag);
            });
            
            // 触摸事件
            scrollbarThumb.addEventListener('touchstart', function(e) {
                e.preventDefault();
                isDragging = true;
                dragStartY = e.touches[0].clientY;
                thumbStartY = parseInt(scrollbarThumb.style.top) || 0;
                
                // 停止自动滚动
                stopDisplayScrolling();
                
                document.addEventListener('touchmove', handleThumbTouch, { passive: false });
                document.addEventListener('touchend', stopThumbDrag);
            });
            
            function handleThumbDrag(e) {
                if (!isDragging) return;
                
                const deltaY = e.clientY - dragStartY;
                const containerHeight = scrollbarContainer.clientHeight;
                const thumbHeight = scrollbarThumb.clientHeight;
                const maxThumbPosition = containerHeight - thumbHeight;
                
                let newThumbPosition = thumbStartY + deltaY;
                newThumbPosition = Math.max(0, Math.min(maxThumbPosition, newThumbPosition));
                
                scrollbarThumb.style.top = `${newThumbPosition}px`;
                updatePositionFromScrollbar(newThumbPosition);
            }
            
            function handleThumbTouch(e) {
                if (!isDragging) return;
                e.preventDefault();
                
                const deltaY = e.touches[0].clientY - dragStartY;
                const containerHeight = scrollbarContainer.clientHeight;
                const thumbHeight = scrollbarThumb.clientHeight;
                const maxThumbPosition = containerHeight - thumbHeight;
                
                let newThumbPosition = thumbStartY + deltaY;
                newThumbPosition = Math.max(0, Math.min(maxThumbPosition, newThumbPosition));
                
                scrollbarThumb.style.top = `${newThumbPosition}px`;
                updatePositionFromScrollbar(newThumbPosition);
            }
            
            function stopThumbDrag() {
                isDragging = false;
                document.removeEventListener('mousemove', handleThumbDrag);
                document.removeEventListener('mouseup', stopThumbDrag);
                document.removeEventListener('touchmove', handleThumbTouch);
                document.removeEventListener('touchend', stopThumbDrag);
            }
            
            // 滚动条容器点击事件（跳转到点击位置）
            scrollbarContainer.addEventListener('click', function(e) {
                if (e.target === scrollbarContainer) {
                    const containerRect = scrollbarContainer.getBoundingClientRect();
                    const clickY = e.clientY - containerRect.top;
                    const thumbHeight = scrollbarThumb.clientHeight;
                    const containerHeight = scrollbarContainer.clientHeight;
                    const maxThumbPosition = containerHeight - thumbHeight;
                    
                    let newThumbPosition = clickY - thumbHeight / 2;
                    newThumbPosition = Math.max(0, Math.min(maxThumbPosition, newThumbPosition));
                    
                    scrollbarThumb.style.top = `${newThumbPosition}px`;
                    updatePositionFromScrollbar(newThumbPosition);
                    
                    // 停止自动滚动
                    stopDisplayScrolling();
                }
            });
            
            // 滚动条容器触摸事件
            scrollbarContainer.addEventListener('touchstart', function(e) {
                if (e.target === scrollbarContainer) {
                    e.preventDefault();
                    const containerRect = scrollbarContainer.getBoundingClientRect();
                    const touchY = e.touches[0].clientY - containerRect.top;
                    const thumbHeight = scrollbarThumb.clientHeight;
                    const containerHeight = scrollbarContainer.clientHeight;
                    const maxThumbPosition = containerHeight - thumbHeight;
                    
                    let newThumbPosition = touchY - thumbHeight / 2;
                    newThumbPosition = Math.max(0, Math.min(maxThumbPosition, newThumbPosition));
                    
                    scrollbarThumb.style.top = `${newThumbPosition}px`;
                    updatePositionFromScrollbar(newThumbPosition);
                    
                    // 停止自动滚动
                    stopDisplayScrolling();
                }
            });
        }
        
        // 触屏控制事件
        function initTouchControls() {
            previewArea.addEventListener('click', function(e) {
                // 防止滚动条区域的点击事件触发屏幕控制
                if (e.target.closest('.scrollbar-container')) return;
                
                clearTimeout(tapTimeout);
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                
                if (tapLength < 300 && tapLength > 0) {
                    // 双击 - 切换播放/暂停
                    if (displayIsPlaying) {
                        stopDisplayScrolling();
                    } else {
                        startDisplayScrolling();
                    }
                } else {
                    // 单击 - 停止滚动
                    tapTimeout = setTimeout(function() {
                        stopDisplayScrolling();
                    }, 200);
                }
                
                lastTap = currentTime;
            });
            
            // 触摸事件处理
            previewArea.addEventListener('touchstart', function(e) {
                // 防止滚动条区域的触摸事件触发屏幕控制
                if (e.target.closest('.scrollbar-container')) return;
                
                clearTimeout(tapTimeout);
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                
                if (tapLength < 300 && tapLength > 0) {
                    // 双击 - 切换播放/暂停
                    e.preventDefault();
                    if (displayIsPlaying) {
                        stopDisplayScrolling();
                    } else {
                        startDisplayScrolling();
                    }
                } else {
                    // 单击 - 停止滚动
                    tapTimeout = setTimeout(function() {
                        stopDisplayScrolling();
                    }, 200);
                }
                
                lastTap = currentTime;
            });
        }
        
        // 文本更新
        function sendTextUpdate() {
            currentText = textInput.value || "在此输入提词文本...";
            
            // 更新预览文本，处理镜像状态
            if (isMirrored) {
                previewText.setAttribute('data-text', currentText);
                previewText.textContent = ''; // 清空内容，让伪元素显示
            } else {
                previewText.textContent = currentText;
                previewText.removeAttribute('data-text');
            }
            
            // 重置滚动状态
            stopDisplayScrolling();
            displayPosition = 0;
            isScrollComplete = false;
            setTimeout(() => {
                initDisplayScrolling();
                updateDisplayPosition();
                updatePlayState(false);
                
                // 发送文本高度和位置更新
                sendStatusUpdate('textHeight', displayTextHeight);
                sendStatusUpdate('positionUpdate', displayPosition);
            }, 100);
        }
        
        // 文件打开功能 - 彻底修复华为鸿蒙兼容性
        function initFileOpen() {
            openFileBtn.addEventListener('click', () => {
                // 创建新的文件输入元素，避免缓存问题
                const newFileInput = document.createElement('input');
                newFileInput.type = 'file';
                newFileInput.accept = '*/*'; // 接受所有文件类型
                newFileInput.style.display = 'none';
                
                newFileInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    // 手动检查文件扩展名
                    const fileName = file.name.toLowerCase();
                    if (!fileName.endsWith('.txt')) {
                        alert('请选择.txt文本文件');
                        return;
                    }
                    
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            textInput.value = e.target.result;
                            sendTextUpdate();
                            alert('文件加载成功！');
                        } catch (error) {
                            alert('文件读取失败：' + error.message);
                        }
                    };
                    reader.onerror = function() {
                        alert('文件读取失败，请重试');
                    };
                    
                    // 使用不同的读取方法尝试
                    try {
                        reader.readAsText(file);
                    } catch (error) {
                        alert('无法读取文件：' + error.message);
                    }
                    
                    // 清理
                    document.body.removeChild(newFileInput);
                });
                
                document.body.appendChild(newFileInput);
                newFileInput.click();
            });
        }
        
        // 镜像功能 - 使用伪元素彻底解决间距问题
        function initMirrorFunction() {
            mirrorBtn.addEventListener('click', () => {
                isMirrored = !isMirrored;
                
                if (isMirrored) {
                    // 应用镜像效果
                    previewText.classList.add('mirror');
                    previewText.setAttribute('data-text', currentText);
                    previewText.textContent = ''; // 清空内容，让伪元素显示
                    mirrorBtn.textContent = '取消镜像';
                } else {
                    // 取消镜像效果
                    previewText.classList.remove('mirror');
                    previewText.textContent = currentText;
                    previewText.removeAttribute('data-text');
                    mirrorBtn.textContent = '镜像';
                }
                
                // 重新初始化滚动
                setTimeout(() => {
                    initDisplayScrolling();
                    updateDisplayPosition();
                }, 100);
            });
        }
        
        // 事件监听
        startBtn.addEventListener('click', () => {
            if (isScrollComplete) {
                displayPosition = 0;
                isScrollComplete = false;
                updateDisplayPosition();
                updateScrollbar();
            }
            startDisplayScrolling();
        });
        
        pauseBtn.addEventListener('click', () => {
            stopDisplayScrolling();
        });
        
        resetBtn.addEventListener('click', () => {
            stopDisplayScrolling();
            displayPosition = 0;
            isScrollComplete = false;
            updateDisplayPosition();
            updateScrollbar();
            updatePlayState(false);
            
            // 发送位置更新到遥控器
            sendStatusUpdate('positionUpdate', displayPosition);
        });
        
        speedSlider.addEventListener('input', function() {
            const speed = parseInt(this.value);
            speedValue.textContent = speed;
        });
        
        fontSizeSlider.addEventListener('input', function() {
            const fontSize = parseInt(this.value);
            fontSizeValue.textContent = fontSize + 'px';
            previewText.style.fontSize = fontSize + 'px';
            
            setTimeout(() => {
                initDisplayScrolling();
                updateDisplayPosition();
                updateScrollbar();

                // 确保发送文本高度更新
                sendStatusUpdate('textHeight', displayTextHeight);
            }, 100);
        });
        
        textInput.addEventListener('input', sendTextUpdate);
        
        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            sendTextUpdate();
        });
        
        // 初始化和响应式调整
        window.addEventListener('resize', () => {
            setTimeout(() => {
                initDisplayScrolling();
                updateDisplayPosition();
                updateScrollbar();

                // 发送文本高度更新
                sendStatusUpdate('textHeight', displayTextHeight);
            }, 100);
        });
        
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                initDisplayScrolling();
                updateDisplayPosition();
                updateScrollbar();

                // 发送文本高度更新
                sendStatusUpdate('textHeight', displayTextHeight);
            }, 300);
        });
        
        // 初始化
        function init() {
            textInput.value = currentText;
            previewText.textContent = currentText;
            
            // 初始化滚动条事件
            initScrollbarEvents();
            
            // 初始化WebSocket连接
            initWebSocket();

            // 初始化触屏控制
            initTouchControls();
            
            // 初始化文件打开功能
            initFileOpen();
            
            // 初始化镜像功能
            initMirrorFunction();
            
            setTimeout(() => {
                initDisplayScrolling();
                updateScrollbar();
            }, 1000);
        }
        
        // 启动初始化
        init();
    </script>
</body>
</html>
